apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  configuration:
    developerConfiguration:
      useEmulation: {{ .Values.useEmulation | default false }}
      featureGates:
        {{- range .Values.featureGates }}
        - {{ . }}
        {{- end }}
