[all:vars]
ansible_user=vagrant
ansible_become=yes
ansible_ssh_private_key_file="{{ lookup('env', 'PWD') }}/infra/vm/vagrant/.vagrant/machines/{{ v_name }}/virtualbox/private_key"
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o PubkeyAcceptedAlgorithms=+ssh-rsa'
ansible_python_interpreter=/usr/bin/python3
