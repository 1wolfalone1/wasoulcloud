[ceph_mons]
ceph-1 ansible_host=192.168.56.16 v_name=wacloud-node-6
ceph-2 ansible_host=192.168.56.17 v_name=wacloud-node-7
ceph-3 ansible_host=192.168.56.18 v_name=wacloud-node-8

[ceph_osds]
ceph-1 ansible_host=192.168.56.16 v_name=wacloud-node-6
ceph-2 ansible_host=192.168.56.17 v_name=wacloud-node-7
ceph-3 ansible_host=192.168.56.18 v_name=wacloud-node-8

[ceph_mgrs]
