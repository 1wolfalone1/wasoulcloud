---
- name: Load bridge netfilter and overlay modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - br_netfilter
    - overlay

- name: Persist modules on reboot
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Set sysctl parameters for K8s networking
  sysctl:
    name: "{{ item }}"
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes
  loop:
    - net.bridge.bridge-nf-call-iptables
    - net.bridge.bridge-nf-call-ip6tables
    - net.ipv4.ip_forward

- name: Disable SWAP (K8s requirement)
  shell: |
    swapoff -a
    sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab
  changed_when: false

- name: Install Prerequisite Packages
  apt:
    name: [apt-transport-https, ca-certificates, curl, software-properties-common, gnupg2]
    update_cache: yes

# --- Containerd Setup ---

- name: Install containerd
  apt:
    name: containerd
    state: present

- name: Create containerd directory
  file:
    path: /etc/containerd
    state: directory

- name: Generate default containerd config
  shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- name: Set containerd to use systemd cgroup driver
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: restart containerd

- name: Ensure containerd is running and enabled
  systemd:
    name: containerd
    state: started
    enabled: yes
    daemon_reload: yes

# --- Kubernetes Tools Setup ---

- name: Add Kubernetes GPG Key
  get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: '0644'
    force: yes

- name: Add Kubernetes Repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /"
    state: present
    update_cache: yes

- name: Install K8s Tools
  apt:
    name: [kubelet, kubeadm, kubectl]
    state: present

- name: Create Kubelet drop-in directory
  file:
    path: /etc/systemd/system/kubelet.service.d
    state: directory

- name: Set node-ip in /etc/default/kubelet
  copy:
    dest: /etc/default/kubelet
    content: |
      KUBELET_EXTRA_ARGS=--node-ip={{ ansible_host }} --container-runtime-endpoint=unix:///var/run/containerd/containerd.sock
  notify: restart kubelet

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Restart kubelet immediately
  systemd:
    name: kubelet
    state: restarted
  ignore_errors: yes
